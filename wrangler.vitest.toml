# Vitest / Miniflare only: no service bindings (Twitter account proxy is mocked via test harness).
name = "fixtweet-vitest"
account_id = "00000000000000000000000000000000"
main = "./dist/worker.js"
compatibility_date = "2025-03-21"
send_metrics = false
no_bundle = true

analytics_engine_datasets = [
  { binding = "AnalyticsEngine" }
]

[ai]
binding = "AI"

[build]
command = "npm run build"
